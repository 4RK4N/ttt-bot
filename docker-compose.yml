# The caddy-docker-proxy network is created by your Caddy stack; we just join it.

networks:
  caddy:
    external: true

services:
  ttt-discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
      ulimits:
        nproc: 65535

    image: ttt-discord-bot:1.0.0

    pull_policy: build

    container_name: ttt-discord-bot

    volumes:
      - ./data:/app/data

    restart: unless-stopped

  ttt-web-editor:
    image: ttt-discord-bot:1.0.0

    pull_policy: never

    container_name: ttt-web-editor

    depends_on:
      - ttt-discord-bot

    command: ["node", "dist/src/web/server.js"]

    volumes:
      - ./data:/app/data

    networks:
      - caddy

    labels:
      caddy: bot.ttt-ffxiv.eu

      caddy.reverse_proxy: "{{upstreams 8088}}"

    restart: unless-stopped

  ttt-website:
    build:
      context: ./website
      dockerfile: Dockerfile
      ulimits:
        nproc: 65535

    image: ttt-website:1.0.0

    pull_policy: build

    container_name: ttt-website

    depends_on:
      - ttt-discord-bot

    networks:
      - caddy

    labels:
      caddy: ttt-ffxiv.eu

      caddy.reverse_proxy: "{{upstreams 8089}}"

    restart: unless-stopped
